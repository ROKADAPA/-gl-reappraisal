<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#0B1E3D">
<title>GL Reappraisal Pro</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
/* ═══ RESET ══════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0B1E3D;--navy2:#102347;--navy3:#1A3566;
  --gold:#C9971A;--goldL:#F0C84A;--goldP:#FDF3D0;
  --green:#1A7A4A;--greenBg:#E8F5EE;
  --red:#B91C1C;--redBg:#FEE2E2;
  --amber:#B45309;--amberBg:#FEF3C7;
  --gray:#6B7280;--grayL:#F3F4F6;
  --border:#E2DDD5;--text:#1C1917;--text2:#57534E;
  --cream:#FAF7F0;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--navy)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  font-size:14px;color:var(--text);display:flex;flex-direction:column}

/* ═══ APP SHELL ══════════════════════════════════ */
#app{display:flex;flex-direction:column;height:100%;overflow:hidden}
#app-header{
  background:var(--navy);color:white;
  padding:calc(10px + var(--safe-top)) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;min-height:56px;
}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:34px;height:34px;background:var(--gold);border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:600;line-height:1.2}
.hdr-sub{font-size:10px;opacity:.6;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:6px}
.online-pill{background:rgba(26,122,74,.25);color:#6EE7B7;border:1px solid rgba(26,122,74,.4);
  padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:4px}
.online-dot{width:6px;height:6px;border-radius:50%;background:#6EE7B7;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.offline-pill{background:rgba(180,83,9,.25);color:#FCD34D;border:1px solid rgba(180,83,9,.4);
  padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
.icon-btn{background:rgba(255,255,255,.1);border:none;color:white;width:34px;height:34px;
  border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}

/* ═══ BODY AREA ══════════════════════════════════ */
#app-body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;background:var(--cream)}
.page{display:none;padding:14px 14px calc(80px + var(--safe-bot));min-height:100%;animation:fadeUp .2s ease}
.page.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ═══ BOTTOM NAV ═════════════════════════════════ */
#app-nav{
  background:var(--navy);
  display:flex;border-top:1px solid rgba(255,255,255,.1);
  padding-bottom:var(--safe-bot);flex-shrink:0;
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 6px;cursor:pointer;transition:all .15s;border:none;background:none;color:rgba(255,255,255,.5)}
.nav-item.active{color:var(--goldL)}
.nav-item .nav-icon{font-size:20px;margin-bottom:3px}
.nav-item .nav-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.nav-item.active .nav-icon{transform:scale(1.1)}

/* ═══ LOGIN PAGE ════════════════════════════════ */
#login-page{
  position:fixed;inset:0;z-index:200;
  background:var(--navy);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.login-card{background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,.4)}
.login-logo{text-align:center;margin-bottom:22px}
.login-logo-icon{width:72px;height:72px;background:var(--gold);border-radius:18px;
  display:inline-flex;align-items:center;justify-content:center;font-size:34px;
  margin-bottom:12px;box-shadow:0 8px 24px rgba(201,151,26,.4)}
.login-logo h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:2px}
.login-logo p{font-size:11px;color:var(--gray)}
.login-err{background:var(--redBg);color:var(--red);border-radius:8px;padding:10px 12px;
  font-size:12px;margin-bottom:14px;display:none;border:1px solid rgba(185,28,28,.2)}
.f-group{margin-bottom:14px}
.f-group label{display:block;font-size:11px;font-weight:700;color:var(--gray);
  text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.f-group input,.f-group select,.f-group textarea{
  width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:inherit;color:var(--text);background:white;outline:none;
  transition:border-color .15s;-webkit-appearance:none}
.f-group input:focus,.f-group select:focus,.f-group textarea:focus{border-color:var(--navy3)}
.f-group input[type=number]{font-family:monospace}
.pwd-wrap{position:relative}
.pwd-wrap input{padding-right:44px}
.pwd-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;font-size:16px;cursor:pointer;color:var(--gray)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;
  border:none;font-family:inherit;transition:all .15s;width:100%}
.btn-navy{background:var(--navy);color:white}
.btn-navy:active{background:var(--navy3)}
.btn-gold{background:var(--gold);color:white}
.btn-gold:active{background:#A87D12}
.btn-green{background:var(--green);color:white}
.btn-green:active{opacity:.85}
.btn-red{background:var(--red);color:white}
.btn-outline{background:transparent;color:var(--navy);border:1.5px solid var(--border)}
.btn-sm{padding:10px 16px;font-size:12px;border-radius:8px;width:auto}
.login-credit{text-align:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);
  font-size:10px;color:var(--gray);line-height:1.7}
.login-credit strong{color:var(--navy);font-weight:600}

/* ═══ CARDS ══════════════════════════════════════ */
.card{background:white;border:1px solid var(--border);border-radius:14px;
  margin-bottom:12px;overflow:hidden;box-shadow:0 1px 4px rgba(11,30,61,.06)}
.card-head{padding:14px 16px 0}
.card-body{padding:14px 16px}
.card-title{font-size:11px;font-weight:700;color:var(--navy);text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-title::before{content:'';width:3px;height:13px;background:var(--gold);
  border-radius:2px;flex-shrink:0}

/* ═══ STATS ══════════════════════════════════════ */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:white;border:1px solid var(--border);border-radius:12px;
  padding:14px;display:flex;align-items:center;gap:10px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;
  justify-content:center;font-size:18px;flex-shrink:0}
.stat-val{font-size:22px;font-weight:700;font-family:monospace;line-height:1}
.stat-lbl{font-size:10px;color:var(--gray);font-weight:500;margin-top:2px}

/* ═══ PROGRESS ═══════════════════════════════════ */
.prog-bar{height:8px;background:var(--grayL);border-radius:4px;overflow:hidden;margin:8px 0}
.prog-fill{height:100%;border-radius:4px;transition:width .5s ease}

/* ═══ BRANCH LIST ITEM ═══════════════════════════ */
.branch-item{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;
  align-items:center;gap:12px;cursor:pointer;background:white;transition:background .1s}
.branch-item:last-child{border-bottom:none}
.branch-item:active{background:var(--grayL)}
.branch-icon{width:42px;height:42px;border-radius:11px;background:rgba(11,30,61,.08);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.branch-name{font-size:14px;font-weight:600;color:var(--navy)}
.branch-meta{font-size:11px;color:var(--gray);margin-top:2px}
.branch-right{margin-left:auto;text-align:right}

/* ═══ STATUS BADGES ══════════════════════════════ */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
  font-size:10px;font-weight:700}
.badge-ok{background:var(--greenBg);color:var(--green)}
.badge-flag{background:var(--redBg);color:var(--red)}
.badge-warn{background:var(--amberBg);color:var(--amber)}
.badge-gray{background:var(--grayL);color:var(--gray)}
.badge-blue{background:#EFF6FF;color:#1D4ED8}

/* ═══ ACCOUNT LIST ITEM ══════════════════════════ */
.acct-item{padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:white;cursor:pointer;transition:background .1s}
.acct-item:last-child{border-bottom:none}
.acct-item:active{background:var(--grayL)}
.acct-item.flagged{background:rgba(185,28,28,.03)}
.acct-num{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.acct-name{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:2px}
.acct-no{font-size:10px;color:var(--gray);font-family:monospace}
.acct-right{margin-left:auto;display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.wt-chip{font-size:9px;font-family:monospace;font-weight:600;padding:2px 6px;
  border-radius:4px;background:var(--grayL);color:var(--gray)}
.wt-chip.bad{background:var(--redBg);color:var(--red)}

/* ═══ ENTRY FORM ════════════════════════════════ */
.wt-section{background:var(--grayL);border-radius:12px;padding:14px;margin-bottom:10px;
  border-left:3px solid var(--navy3)}
.wt-section.reapp{border-left-color:var(--gold)}
.wt-section h4{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  margin-bottom:10px;color:var(--gray)}
.wt-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.copy-btn{width:100%;padding:12px;background:var(--navy);color:white;border:none;
  border-radius:10px;font-size:12px;font-weight:600;cursor:pointer;margin:8px 0;
  display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.copy-btn:active{background:var(--navy3)}
.auto-toggle{display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;background:var(--greenBg);border-radius:10px;margin-bottom:8px;
  border:1px solid rgba(26,122,74,.2)}
.auto-toggle span{font-size:12px;font-weight:600;color:var(--green)}
.toggle-switch{position:relative;width:44px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:12px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;
  background:white;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
input:checked+.toggle-slider{background:var(--green)}
input:checked+.toggle-slider:before{transform:translateX(20px)}
.diff-box{padding:12px 14px;border-radius:10px;margin-top:8px;font-size:12px;font-weight:600;
  display:flex;align-items:center;gap:8px}
.diff-ok{background:var(--greenBg);color:var(--green)}
.diff-bad{background:var(--redBg);color:var(--red)}
.diff-warn{background:var(--amberBg);color:var(--amber)}
.check-row{display:flex;align-items:center;justify-content:space-between;
  padding:13px 14px;background:var(--grayL);border-radius:10px;margin-bottom:8px;
  border:1px solid var(--border)}
.check-row-label{font-size:12px;font-weight:500;color:var(--text);flex:1;padding-right:12px}
.yn-group{display:flex;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;flex-shrink:0}
.yn-btn{padding:7px 16px;border:none;font-size:11px;font-weight:700;cursor:pointer;
  background:white;color:var(--gray);transition:all .15s;font-family:inherit}
.yn-btn.yes-active{background:var(--green);color:white}
.yn-btn.no-active{background:var(--red);color:white}
.copied-badge{background:var(--greenBg);color:var(--green);font-size:10px;font-weight:700;
  padding:4px 10px;border-radius:8px;text-align:center;margin-top:6px;display:none}

/* ═══ NAV COUNTER BADGE ══════════════════════════ */
.nav-badge{position:relative;display:inline-block}
.nav-badge-count{position:absolute;top:-6px;right:-10px;background:var(--red);color:white;
  font-size:8px;font-weight:700;width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;border:2px solid var(--navy)}

/* ═══ SECTION HEADER ════════════════════════════ */
.sec-head{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;
  letter-spacing:.6px;margin:16px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:7px}
.sec-head::before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px}

/* ═══ ALERT BOXES ═══════════════════════════════ */
.alert{padding:12px 14px;border-radius:10px;font-size:12px;line-height:1.5;
  margin-bottom:12px;display:flex;gap:8px;align-items:flex-start}
.alert-info{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE}
.alert-warn{background:var(--amberBg);color:var(--amber);border:1px solid #FCD34D}
.alert-ok{background:var(--greenBg);color:var(--green);border:1px solid #6EE7B7}
.alert-err{background:var(--redBg);color:var(--red);border:1px solid #FCA5A5}

/* ═══ UPLOAD ZONE ═══════════════════════════════ */
.upload-zone{border:2px dashed var(--gold);border-radius:14px;padding:28px 20px;
  text-align:center;background:var(--goldP);cursor:pointer;transition:all .2s}
.upload-zone:active{background:#FEF0B5}
.upload-zone .uz-icon{font-size:36px;margin-bottom:8px}
.upload-zone p{font-size:13px;color:var(--text2);margin-top:4px}
.upload-zone strong{color:var(--navy)}

/* ═══ CRED CARD ═════════════════════════════════ */
.cred-card{background:var(--navy);border-radius:16px;padding:20px;color:white;margin-top:12px}
.cred-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.cred-chip{background:rgba(201,151,26,.2);border:1px solid rgba(201,151,26,.3);
  border-radius:10px;padding:10px;text-align:center}
.cred-chip-label{font-size:9px;color:var(--goldL);font-weight:700;margin-bottom:4px}
.cred-chip-val{font-size:17px;font-weight:700;font-family:monospace;letter-spacing:.5px}

/* ═══ FAB ═══════════════════════════════════════ */
.fab{position:fixed;bottom:calc(70px + var(--safe-bot) + 12px);right:16px;
  width:52px;height:52px;background:var(--gold);color:white;border:none;
  border-radius:16px;font-size:22px;cursor:pointer;z-index:50;
  box-shadow:0 4px 16px rgba(201,151,26,.4);display:flex;align-items:center;justify-content:center;
  transition:all .15s}
.fab:active{transform:scale(.93)}

/* ═══ SEARCH BAR ════════════════════════════════ */
.search-bar{display:flex;align-items:center;gap:8px;background:white;
  border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px}
.search-bar input{flex:1;border:none;outline:none;font-size:13px;background:transparent;font-family:inherit}
.search-bar .search-icon{color:var(--gray);font-size:16px}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px;
  scrollbar-width:none;-ms-overflow-style:none}
.filter-chips::-webkit-scrollbar{display:none}
.fchip{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);
  background:white;color:var(--gray);flex-shrink:0;transition:all .15s}
.fchip.active-ok{background:var(--green);color:white;border-color:var(--green)}
.fchip.active-flag{background:var(--red);color:white;border-color:var(--red)}
.fchip.active-warn{background:var(--amber);color:white;border-color:var(--amber)}
.fchip.active-gray{background:var(--gray);color:white;border-color:var(--gray)}
.fchip.active-navy{background:var(--navy);color:white;border-color:var(--navy)}

/* ═══ REPORT / ANNEXURE ══════════════════════════ */
.ann-wrap{background:white;font-family:'Times New Roman',Times,serif;
  font-size:9.5pt;color:#000;padding:10px}
.ann-outer{width:100%;border-collapse:collapse;border:1.5px solid #000;margin-bottom:6px}
.ann-outer td{border:1px solid #000;padding:4px 6px;font-size:9pt;vertical-align:top}
.ann-title{font-size:11pt;font-weight:bold;text-align:center;text-decoration:underline;margin-bottom:4px}
.ann-sub{font-size:9pt;font-weight:bold;text-align:center;margin:5px 0;text-transform:uppercase}
.ann-tbl{width:100%;border-collapse:collapse;font-size:7pt;table-layout:fixed}
.ann-tbl th{background:#f0f0f0;border:1px solid #000;padding:2px 3px;
  text-align:center;font-weight:bold;font-size:6.5pt;vertical-align:middle}
.ann-tbl td{border:1px solid #000;padding:2px 3px;font-size:7pt;vertical-align:middle;text-align:center}
.ann-tbl td.l{text-align:left}
.ann-flag td{background:#fff0f0}
.sig-tbl{width:100%;border-collapse:collapse;margin-top:10px}
.sig-tbl td{width:25%;text-align:center;padding:3px 6px;font-size:8pt;vertical-align:bottom}
.sig-line{border-top:1px solid #000;margin:30px auto 4px;width:80%}
#ann-print-wrap{display:none}
.report-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -14px;padding:0 14px}
.ann-tbl-min{min-width:900px}

/* ═══ PRINT ══════════════════════════════════════ */
@media print{
  @page{size:A4 landscape;margin:7mm 9mm}
  body,html{overflow:visible!important;height:auto!important}
  #app{display:none!important}
  #ann-print-wrap{display:block!important}
  .ann-wrap *{overflow:visible!important}
  .ann-tbl thead{display:table-header-group}
  .ann-tbl{min-width:unset!important;font-size:6.5pt!important}
  .ann-tbl td,.ann-tbl th{font-size:6.5pt!important;padding:2px 3px!important;min-height:13px}
  .ann-outer td{font-size:8pt!important;padding:2px 4px!important}
  .ann-title{font-size:10pt!important}
  .ann-sub{font-size:8pt!important}
}

/* ═══ LOADING ════════════════════════════════════ */
.spinner{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite;margin:auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-center{display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:200px;gap:14px}
.loading-txt{color:var(--gray);font-size:12px}

/* ═══ EMPTY STATE ════════════════════════════════ */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:250px;gap:12px;text-align:center;padding:24px}
.empty .e-icon{font-size:52px;opacity:.4}
.empty .e-title{font-size:16px;font-weight:600;color:var(--navy)}
.empty .e-sub{font-size:12px;color:var(--gray)}

/* ═══ DIVIDER ════════════════════════════════════ */
.divider{height:1px;background:var(--border);margin:12px 0}

/* ═══ MODAL BOTTOM SHEET ════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none}
.overlay.open{display:flex;align-items:flex-end}
.sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-height:85vh;
  overflow-y:auto;padding:0 0 calc(16px + var(--safe-bot));animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;
  margin:12px auto 6px}
.sheet-title{font-size:15px;font-weight:700;color:var(--navy);padding:8px 16px 14px;
  border-bottom:1px solid var(--border)}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .1s}

function initFB(){
  try{
    const app = firebase.initializeApp(FB_CFG);
    DB = firebase.database();
    // Offline persistence
    DB.ref('.info/connected').on('value', snap=>{
      _isOnline = snap.val() === true;
      const b = document.getElementById('offline-banner');
      const p = document.getElementById('conn-pill');
      if(b) b.className = _isOnline ? 'offline-banner' : 'offline-banner show';
      if(p) p.innerHTML = _isOnline
        ? '<div class="online-dot"></div>Live'
        : '<span style="color:#FCD34D">● Offline</span>';
    });
  }catch(e){ console.error('Firebase init error',e); }
}

async function dbSet(path,val){ if(DB) return DB.ref(path).set(val); lsSet(path,val); }
async function dbGet(path){
  if(DB){ const s = await DB.ref(path).get(); return s.exists()?s.val():null; }
  return lsGet(path);
}
async function dbDel(path){ if(DB) return DB.ref(path).remove(); lsDel(path); }

// Local storage fallback
function lsSet(p,v){const d=lsAll();setPath(d,p,v);localStorage.setItem('gl-db',JSON.stringify(d))}
function lsGet(p){return getPath(lsAll(),p)}
function lsDel(p){const d=lsAll();delPath(d,p);localStorage.setItem('gl-db',JSON.stringify(d))}
function lsAll(){try{return JSON.parse(localStorage.getItem('gl-db')||'{}')}catch{return{}}}
function setPath(o,p,v){const k=p.split('/').filter(Boolean);let c=o;for(let i=0;i<k.length-1;i++){if(!c[k[i]])c[k[i]]={};c=c[k[i]]}c[k[k.length-1]]=v}
function getPath(o,p){const k=p.split('/').filter(Boolean);let c=o;for(const x of k){if(!c||typeof c!=='object')return null;c=c[x]}return c??null}
function delPath(o,p){const k=p.split('/').filter(Boolean);let c=o;for(let i=0;i<k.length-1;i++){if(!c[k[i]])return;c=c[k[i]]}delete c[k[k.length-1]];localStorage.setItem('gl-db',JSON.stringify(o))}

function togglePwd(){const i=document.getElementById('l-pwd');i.type=i.type==='password'?'text':'password'}

async function doLogin(){
  const uid=document.getElementById('l-uid').value.trim();
  const pwd=document.getElementById('l-pwd').value.trim();
  const err=document.getElementById('login-err');
  const btn=document.getElementById('login-btn');
  err.style.display='none';
  if(!uid||!pwd){err.textContent='Enter User ID and Password';err.style.display='block';return}
  btn.textContent='Logging in...'; btn.disabled=true;
  try{
    if(uid===ADMIN_ID&&pwd===ADMIN_PW){
      CUR={role:'admin',uid,branchName:'Regional Office Kadapa',branchCode:''};
      localStorage.setItem('gl-session',JSON.stringify(CUR));
      showApp(); return;
    }
    const creds=await dbGet('gl-creds')||{};
    const c=creds[uid];
    // Fix: c.active can be true (boolean) or 1 (number) — check it is not explicitly false
    if(c && String(c.password)===String(pwd) && c.active!==false && c.active!==0){
      CUR={role:'branch',uid,
        branchCode: c.branch_code||c.branchCode||'',
        branchName: c.branch_name||c.branchName||''};
      localStorage.setItem('gl-session',JSON.stringify(CUR));
      showApp(); return;
    }
    if(c && String(c.password)!==String(pwd)){
      err.textContent='Wrong password. Contact RO Kadapa.';
    } else if(c && (c.active===false||c.active===0)){
      err.textContent='Your credential is disabled. Contact RO Kadapa.';
    } else {
      err.textContent='User ID not found. Contact RO Kadapa.';
    }
    err.style.display='block';
  }catch(e){
    err.textContent='Connection error: '+e.message+'. Try again.';
    err.style.display='block';
  }
  btn.textContent='Login →'; btn.disabled=false;
}

function doLogout(){
  localStorage.removeItem('gl-session');
  CUR=null; _brAccs=[]; _brIdx=0;
  document.getElementById('login-page').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('l-uid').value='';
  document.getElementById('l-pwd').value='';
  closeSheet();
}

async function renderAdminDashboard(){
  const el=document.getElementById('pg-dashboard');
  el.innerHTML=`<div class="loading-center"><div class="spinner"></div><div class="loading-txt">Loading dashboard...</div></div>`;
  const branches=await dbGet('gl-branches')||{};
  const codes=Object.keys(branches);
  if(!codes.length){
    el.innerHTML=`<div class="empty"><div class="e-icon">📂</div>
      <div class="e-title">No Branches Yet</div>
      <div class="e-sub">Go to Upload tab to add branch data</div></div>`;
    return;
  }
  let totBr=codes.length,doneBr=0,partBr=0,notBr=0,totAcc=0,verAcc=0,flagAcc=0,pendAcc=0;
  const rows=[];
  for(const code of codes){
    const b=branches[code];
    const accsObj=await dbGet('gl-accounts/'+code)||{};
    const accs=Object.values(accsObj);
    const tot=accs.length,done=accs.filter(a=>a.status==='ok').length,
      flag=accs.filter(a=>a.status==='flagged').length,
      notv=accs.filter(a=>a.status==='not_verified').length,
      pend=accs.filter(a=>a.status==='pending').length;
    const pct=tot>0?Math.round((done+flag+notv)/tot*100):0;
    totAcc+=tot;verAcc+=done;flagAcc+=flag;pendAcc+=pend;
    if(pct===100)doneBr++;else if(pct>0)partBr++;else notBr++;
    rows.push({b,code,tot,done,flag,pend,pct});
  }
  el.innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:rgba(11,30,61,.08)">🏦</div>
        <div><div class="stat-val" style="color:var(--navy3)">${totBr}</div><div class="stat-lbl">Branches</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--greenBg)">✅</div>
        <div><div class="stat-val" style="color:var(--green)">${doneBr}</div><div class="stat-lbl">Completed</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--amberBg)">⏳</div>
        <div><div class="stat-val" style="color:var(--amber)">${partBr}</div><div class="stat-lbl">In Progress</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--redBg)">🔴</div>
        <div><div class="stat-val" style="color:var(--red)">${notBr}</div><div class="stat-lbl">Not Started</div></div></div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-icon" style="background:rgba(11,30,61,.08)">📋</div>
        <div><div class="stat-val" style="color:var(--navy3)">${totAcc}</div><div class="stat-lbl">Total Accounts</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--greenBg)">✔️</div>
        <div><div class="stat-val" style="color:var(--green)">${verAcc}</div><div class="stat-lbl">Verified</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--redBg)">⚠️</div>
        <div><div class="stat-val" style="color:var(--red)">${flagAcc}</div><div class="stat-lbl">Flagged</div></div></div>
      <div class="stat-card"><div class="stat-icon" style="background:var(--amberBg)">🕐</div>
        <div><div class="stat-val" style="color:var(--amber)">${pendAcc}</div><div class="stat-lbl">Pending</div></div></div>
    </div>
    <div class="sec-head">Branch Progress</div>
    <div class="card">
      ${rows.map(r=>{
        const clr=r.pct===100?'var(--green)':r.pct>0?'var(--amber)':'var(--red)';
        const lbl=r.pct===100?'✓ Complete':r.pct>0?'In Progress':'Not Started';
        return `<div class="branch-item" onclick="showBranchDetail('${r.code}')">
          <div class="branch-icon">🏦</div>
          <div style="flex:1;min-width:0">
            <div class="branch-name" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.b.name}</div>
            <div class="branch-meta">${r.code} · ${r.b.quarter||'—'}</div>
            <div class="prog-bar" style="margin:6px 0 4px">
              <div class="prog-fill" style="width:${r.pct}%;background:${clr}"></div></div>
            <div style="display:flex;gap:8px;font-size:10px">
              <span style="color:var(--green)">✓${r.done}</span>
              <span style="color:var(--red)">⚠${r.flag}</span>
              <span style="color:var(--amber)">●${r.pend}</span>
            </div>
          </div>
          <div class="branch-right">
            <div style="font-size:16px;font-weight:700;color:${clr}">${r.pct}%</div>
            <div style="font-size:10px;color:${clr};margin-top:2px">${lbl}</div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

async function showBranchDetail(code){
  const b=(await dbGet('gl-branches')||{})[code]||{};
  const accsObj=await dbGet('gl-accounts/'+code)||{};
  const accs=Object.values(accsObj);
  const done=accs.filter(a=>a.status==='ok').length;
  const flag=accs.filter(a=>a.status==='flagged').length;
  const pend=accs.filter(a=>a.status==='pending').length;
  openSheet(b.name,[
    {icon:'📊',color:'#EFF6FF',label:`${done} Verified, ${flag} Flagged, ${pend} Pending`,sub:`Total: ${accs.length} accounts`},
    {icon:'📄',color:C_greenBg,label:'Generate Report',sub:'Print Annexure II PDF',fn:`generateReport('${code}')`},
  ]);
}

function handleExcel(inp){
  const file=inp.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!rows.length){showMsg('up-msg','No data found','warn');return}
      const keys=Object.keys(rows[0]);
      const fc=cs=>keys.find(k=>cs.some(c=>k.toLowerCase().includes(c.toLowerCase())));
      const acCol=fc(['loan account','account no','acc no','loan no']);
      const bnCol=fc(['borrower','name of','customer name']);
      const ogCol=fc(['gross wt','gross weight','orig gross']);
      const onCol=fc(['net wt','net weight','orig net']);
      if(!acCol&&!bnCol){showMsg('up-msg','Cannot detect columns. Need "Loan Account No." and "Name of Borrower"','warn');return}
      _uploadAccs=rows.map((r,i)=>({
        sl:i+1,acno:String(r[acCol]||'').trim(),bname:String(r[bnCol]||'').trim(),
        og:ogCol&&r[ogCol]!==''?parseFloat(r[ogCol])||'':'',
        on_:onCol&&r[onCol]!==''?parseFloat(r[onCol])||'':'',
        rg:'',rn:'',purity:'NO',purity_detail:'',passcard:'YES',tally:'YES',
        appraiser2:'',action:'',status:'pending',not_verified_reason:''
      })).filter(a=>a.acno||a.bname);
      showMsg('up-msg',`✅ ${_uploadAccs.length} accounts loaded from ${file.name}`,'ok');
    }catch(err){showMsg('up-msg','Error: '+err.message,'warn')}
  };
  reader.readAsBinaryString(file);
}

async function saveBranch(){
  const name=document.getElementById('up-bname').value.trim();
  const code=document.getElementById('up-bcode').value.trim();
  if(!name||!code){showMsg('up-save-msg','Branch Name and Code are required','warn');return}
  if(!_uploadAccs.length){showMsg('up-save-msg','Please import Excel file first','warn');return}
  showMsg('up-save-msg','Saving...','info');
  const q=document.getElementById('up-quarter').value;
  const qd=QUARTERS.find(x=>x.value===q)||QUARTERS[0];
  await dbSet('gl-branches/'+code,{
    name,code,ro:document.getElementById('up-ro').value,
    quarter:q,quarter_start:qd.start,quarter_end:qd.end,
    refno:document.getElementById('up-refno').value,
    date:document.getElementById('up-date').value,
    scale:document.getElementById('up-scale').value,
    appraiser:document.getElementById('up-app').value,
    mobile:document.getElementById('up-mob').value,
  });
  const accsObj={};
  _uploadAccs.forEach(a=>accsObj[a.sl]=a);
  await dbSet('gl-accounts/'+code,accsObj);
  _uploadAccs=[];
  showMsg('up-save-msg',`✅ ${name} saved — ${Object.keys(accsObj).length} accounts`,'ok');
  // also create credential suggestion
}

async function createCred(){
  const brCode=document.getElementById('cr-br')?.value;
  const uid=document.getElementById('cr-uid')?.value.trim();
  const pwd=document.getElementById('cr-pwd')?.value.trim();
  if(!uid||!pwd){alert('Fill all fields');return}
  if(uid===ADMIN_ID){alert('This User ID is reserved for Admin');return}
  const branches=await dbGet('gl-branches')||{};
  const brName=branches[brCode]?.name||brCode;
  await dbSet('gl-creds/'+uid,{
    password:pwd,
    branch_code:brCode, branchCode:brCode,
    branch_name:brName, branchName:brName,
    active:true
  });
  showToast('✅ Credential created for '+uid,'ok');
  renderAdminBranches();
}

function renderBranchAccountList(){
  const el=document.getElementById('pg-accounts');

  const pend=_brAccs.filter(a=>a.status==='pending').length;
  const pct=Math.round((done+flag)/(_brAccs.length||1)*100);
  const filtered=_brAccs.filter(a=>{
    const q=_search.toLowerCase();
    const ms=!q||a.acno.toLowerCase().includes(q)||a.bname.toLowerCase().includes(q);
    const mf=_filterStatus==='all'||a.status===_filterStatus;

      <div class="stat-card"><div class="stat-icon" style="background:var(--amberBg)">🕐</div>
        <div><div class="stat-val" style="color:var(--amber)">${pend}</div><div class="stat-lbl">Pending</div></div></div>
    </div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${flag>0?'var(--amber)':'var(--green)'}"></div></div>
    <div style="font-size:11px;color:var(--gray);text-align:right;margin-bottom:12px">${pct}% complete</div>
    <div class="search-bar">

        oninput="_search=this.value;renderBranchAccountList()">

      ${[['all','All','active-navy'],['pending','Pending','active-gray'],
         ['ok','Verified','active-ok'],['flagged','Flagged','active-flag'],
         ['not_verified','Not Verified','active-warn']]
        .map(([v,l,cls])=>`<div class="fchip ${_filterStatus===v?cls:''}" onclick="_filterStatus='${v}';renderBranchAccountList()">${l}</div>`)
        .join('')}
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      ${!filtered.length
        ?'<div class="empty" style="min-height:120px"><div class="e-sub">No accounts found</div></div>'
        :filtered.map((a,i)=>{
          const bc=a.status==='ok'?'var(--green)':a.status==='flagged'?'var(--red)':a.status==='not_verified'?'var(--amber)':'var(--border)';
          const bg=a.status==='ok'?'var(--greenBg)':a.status==='flagged'?'var(--redBg)':a.status==='not_verified'?'var(--amberBg)':'var(--grayL)';
          const lb=a.status==='ok'?'✓':a.status==='flagged'?'⚠':a.status==='not_verified'?'✗':'#'+a.sl;
          const dg=a.rg!==''&&a.rg!==null&&a.og!==''&&a.og!==null?parseFloat(a.rg)-parseFloat(a.og):null;
          const dn=a.rn!==''&&a.rn!==null&&a.on_!==''&&a.on_!==null?parseFloat(a.rn)-parseFloat(a.on_):null;
          const idx=_brAccs.findIndex(x=>x.sl===a.sl);

                ${dg!==null?`<span class="wt-chip ${Math.abs(dg)>0.2?'bad':''}">G:${dg.toFixed(3)}</span>`:''}
                ${dn!==null?`<span class="wt-chip ${Math.abs(dn)>0.1?'bad':''}">N:${dn.toFixed(3)}</span>`:''}
              </div>`:''}
            </div>
            <div class="acct-right">
              <span class="badge ${a.status==='ok'?'badge-ok':a.status==='flagged'?'badge-flag':a.status==='not_verified'?'badge-warn':'badge-gray'}">

function setTog(type,val){
  _toggles[type]=val;
  const ids={purity:['p-yes','p-no'],passcard:['pc-yes','pc-no'],tally:['t-yes','t-no']};
  const [yId,nId]=ids[type];
  const yEl=document.getElementById(yId), nEl=document.getElementById(nId);
  if(yEl){yEl.className='yn-btn '+(val?'yes-active':'');nEl.className='yn-btn '+(val?'':'no-active')}
  if(type==='purity'){
    const dr=document.getElementById('purity-detail-row');
    if(dr)dr.style.display=val?'block':'none';
  }
  calcDiff();
}

function calcDiff(){
  const ogEl=document.getElementById('e-og');
  const onEl=document.getElementById('e-on');
  const rgEl=document.getElementById('e-rg');
  const rnEl=document.getElementById('e-rn');
  const el=document.getElementById('diff-result'); if(!el)return;

  const og=parseFloat(ogEl?.value)||0;
  const on_=parseFloat(onEl?.value)||0;
  const rg=parseFloat(rgEl?.value)||0;
  const rn=parseFloat(rnEl?.value)||0;

  if(!rgEl?.value&&!ogEl?.value){el.innerHTML='';return}

  // ── ACCOUNT CLOSED DETECTION ──
  // If BOTH sanction and reappraisal gross & net are 0 → account closed
  const ogZero = ogEl?.value!==''&&parseFloat(ogEl.value)===0;
  const onZero = onEl?.value!==''&&parseFloat(onEl.value)===0;
  const rgZero = rgEl?.value!==''&&parseFloat(rgEl.value)===0;
  const rnZero = rnEl?.value!==''&&parseFloat(rnEl.value)===0;
  const bothSidesZero = (ogZero||onZero) && (rgZero||rnZero);

  if(bothSidesZero && !document.getElementById('acc-closed-handled')){
    el.innerHTML=`<div class="diff-box diff-warn">
      🔒 Weights are 0 — Is this account <b>CLOSED</b>?
      <div style="display:flex;gap:8px;margin-top:8px">
        <button onclick="markAccountClosed()" style="flex:1;padding:9px;background:var(--amber);color:white;
          border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">
          ✓ Yes — Account Closed</button>
        <button onclick="dismissClosedPrompt()" style="flex:1;padding:9px;background:white;color:var(--gray);
          border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">
          No — Keep Entry</button>
      </div>
    </div>`;
    return;
  }

  const dg=rg-og, dn=rn-on_;
  const grossOk=Math.abs(dg)<=0.2, netOk=Math.abs(dn)<=0.1;
  const allOk=grossOk&&netOk&&!_toggles.purity&&_toggles.passcard&&_toggles.tally;
  const msgs=[];
  if(!grossOk)msgs.push(`Gross diff: ${dg>=0?'+':''}${dg.toFixed(3)}gm ⚠`);
  if(!netOk)msgs.push(`Net diff: ${dn>=0?'+':''}${dn.toFixed(3)}gm ⚠`);
  if(_toggles.purity)msgs.push('Purity mismatch');
  if(!_toggles.passcard)msgs.push('No Pass Card');
  if(!_toggles.tally)msgs.push('Not tallying');
  const discAlert=document.getElementById('disc-alert');
  const saveBtn=document.getElementById('save-next-btn');
  if(!allOk){
    el.innerHTML=`<div class="diff-box diff-bad">⚠️ ${msgs.join(' · ')}</div>`;
    if(discAlert)discAlert.style.display='flex';
    if(saveBtn){saveBtn.style.background='var(--red)';saveBtn.textContent='⚠️ Save & Next'}
  } else {
    el.innerHTML=`<div class="diff-box diff-ok">✅ ${dg===0&&dn===0?'Perfect match — No weight difference':`Within tolerance | G:${dg>=0?'+':''}${dg.toFixed(3)} N:${dn>=0?'+':''}${dn.toFixed(3)}`}</div>`;
    if(discAlert)discAlert.style.display='none';
    if(saveBtn){saveBtn.style.background='var(--green)';saveBtn.textContent='💾 Save & Next'}
  }
}

function markAccountClosed(){
  // Set all weights to 0 and mark action as Account Closed
  ['e-og','e-on','e-rg','e-rn'].forEach(id=>{
    const el=document.getElementById(id);if(el&&!el.value)el.value='0';
  });
  const actionEl=document.getElementById('e-action');
  if(actionEl){
    actionEl.value='Account Closed — Nil balance. No jewels available for reappraisal.';
    actionEl.style.background='#FFF3E0';
    actionEl.style.borderColor='var(--amber)';
  }
  // Add handled marker so popup doesn't repeat
  const el=document.getElementById('diff-result');
  if(el){
    const marker=document.createElement('span');
    marker.id='acc-closed-handled';marker.style.display='none';
    el.appendChild(marker);
    el.innerHTML=`<div class="diff-box diff-warn">🔒 Marked as <b>Account Closed</b> — Remarks filled automatically.</div>`
      +`<span id="acc-closed-handled" style="display:none"></span>`;
  }
  showToast('🔒 Account Closed marked','warn');
}

function dismissClosedPrompt(){
  const el=document.getElementById('diff-result');
  if(el){
    const marker=document.createElement('span');
    marker.id='acc-closed-handled';marker.style.display='none';
    document.body.appendChild(marker); // put outside so it persists
  }
  calcDiff();
}

function tryAutoCopy(){
  if(!_autoCopy)return;
  const og=document.getElementById('e-og')?.value.trim();
  const on_=document.getElementById('e-on')?.value.trim();
  if(!og||!on_)return;
  const rgEl=document.getElementById('e-rg');
  const rnEl=document.getElementById('e-rn');
  const badge=document.getElementById('copied-badge');
  const ogN=parseFloat(og), onN=parseFloat(on_);
  if(!rgEl.value.trim()||(parseFloat(rgEl.value)===ogN)){rgEl.value=ogN.toFixed(3);rgEl.style.background='#F0FAF5'}
  if(!rnEl.value.trim()||(parseFloat(rnEl.value)===onN)){rnEl.value=onN.toFixed(3);rnEl.style.background='#F0FAF5'}
  if(badge)badge.style.display='block';
  calcDiff();
}

function manualCopy(){
  const og=document.getElementById('e-og')?.value.trim();
  const on_=document.getElementById('e-on')?.value.trim();
  if(!og&&!on_){alert('Enter sanction weights first');return}
  const rgEl=document.getElementById('e-rg'), rnEl=document.getElementById('e-rn');
  const badge=document.getElementById('copied-badge');
  if(og){rgEl.value=parseFloat(og).toFixed(3);rgEl.style.background='#F0FAF5'}
  if(on_){rnEl.value=parseFloat(on_).toFixed(3);rnEl.style.background='#F0FAF5'}
  if(badge)badge.style.display='block';
  calcDiff();
}

async function saveEntry(goNext){
  const a=_brAccs[_brIdx];
  const og=document.getElementById('e-og')?.value;
  const on_=document.getElementById('e-on')?.value;
  const rg=document.getElementById('e-rg')?.value;
  const rn=document.getElementById('e-rn')?.value;
  a.og=og!==''?parseFloat(og):''; a.on_=on_!==''?parseFloat(on_):'';
  a.rg=rg!==''?parseFloat(rg):''; a.rn=rn!==''?parseFloat(rn):'';
  a.purity=_toggles.purity?'YES':'NO';
  a.purity_detail=document.getElementById('e-pdetail')?.value||'';
  a.passcard=_toggles.passcard?'YES':'NO';
  a.tally=_toggles.tally?'YES':'NO';
  a.appraiser2=document.getElementById('e-app')?.value||'';
  a.action=document.getElementById('e-action')?.value||'';
  const dg=a.rg!==''&&a.og!==''?Math.abs(a.rg-a.og):0;
  const dn=a.rn!==''&&a.on_!==''?Math.abs(a.rn-a.on_):0;
  const disc=dg>0.2||dn>0.1||a.purity==='YES'||a.passcard==='NO'||a.tally==='NO';
  if(a.rg!==''||a.rn!=='') a.status=disc?'flagged':'ok';
  _brAccs[_brIdx]=a;
  await dbSet('gl-accounts/'+CUR.branchCode+'/'+a.sl,a);
  updatePendingBadge();
  // Toast feedback
  showToast(disc?'⚠️ Saved — Discrepancy flagged':'✅ Saved successfully', disc?'warn':'ok');
  if(goNext&&_brIdx<_brAccs.length-1){_brIdx++;renderEntryForm();}
}

async function markNV(){
  const reason=prompt('Reason for not conducting reappraisal:');
  if(!reason)return;
  const a=_brAccs[_brIdx];
  a.status='not_verified'; a.not_verified_reason=reason;
  _brAccs[_brIdx]=a;
  await dbSet('gl-accounts/'+CUR.branchCode+'/'+a.sl,a);
  updatePendingBadge();
  if(_brIdx<_brAccs.length-1){_brIdx++;renderEntryForm();}
}

  const tbl=pw.querySelector('.ann-tbl');
  if(tbl){tbl.style.tableLayout='fixed';tbl.style.width='100%';tbl.style.minWidth='unset'}
  pw.querySelectorAll('.ann-tbl td,.ann-tbl th').forEach(td=>{
    td.style.fontSize='6.5pt';td.style.padding='2px 3px';

  });
  setTimeout(()=>{window.print();setTimeout(()=>pw.innerHTML='',4000);},400);
}

let _toastTimer;
function showToast(msg,type='ok'){
  let t=document.getElementById('gl-toast');
  if(!t){t=document.createElement('div');t.id='gl-toast';
    Object.assign(t.style,{position:'fixed',bottom:'calc(70px + 16px + env(safe-area-inset-bottom,0px))',
      left:'50%',transform:'translateX(-50%)',padding:'10px 18px',borderRadius:'20px',
      fontWeight:'600',fontSize:'12px',zIndex:'999',whiteSpace:'nowrap',
      boxShadow:'0 4px 16px rgba(0,0,0,.2)',transition:'opacity .3s'});
    document.body.appendChild(t);}
  t.textContent=msg;
  t.style.background=type==='ok'?'var(--green)':type==='warn'?'var(--amber)':'var(--red)';
  t.style.color='white'; t.style.opacity='1';
  clearTimeout(_toastTimer);
  _toastTimer=setTimeout(()=>t.style.opacity='0',2500);
}

window.addEventListener('load',function(){
  initFB();
  if(CUR&&CUR.uid){
    document.getElementById('login-page').style.display='none';
    showApp();
  }
  // Prevent bounce scroll on iOS
  document.body.addEventListener('touchmove',function(e){
    if(e.target.closest('#app-body'))return;
    e.preventDefault();
  },{passive:false});
});
</script>
